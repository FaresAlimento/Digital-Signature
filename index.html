<title>Fares Nasr</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#edf2f7;
font-family:Arial,Helvetica,sans-serif;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

}

.card{

width:100%;
max-width:430px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,.18);

}

.header{

background:linear-gradient(135deg,#0a5ba8,#0f79d0);

padding:30px;
text-align:center;
color:white;

}

.header h1{

font-size:34px;
font-weight:bold;
letter-spacing:1px;

}

.logos{

display:flex;
justify-content:space-evenly;
align-items:center;
padding:20px;
background:white;

}

.logos img{

height:65px;
max-width:140px;
object-fit:contain;

}

.section{

padding:18px 24px;
border-top:1px solid #efefef;

}

.company{

font-size:20px;
font-weight:bold;
color:#0a5ba8;
margin-bottom:12px;

}

.row{

margin-top:8px;
font-size:15px;
word-break:break-word;

}

.row a{

color:#0f79d0;
text-decoration:none;

}

.buttons{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:22px;

}

.btn{

padding:14px;
border-radius:12px;
text-align:center;
color:white;
font-weight:bold;
text-decoration:none;
transition:.3s;

}

.btn:hover{

transform:scale(1.03);

}

.call{

background:#0a5ba8;

}

.whatsapp{

background:#25D366;

}

.save{

background:#ff9800;

}

.full{

grid-column:1/3;

}

.footer{

padding:15px;
text-align:center;
font-size:13px;
color:#666;

}

</style>

</head>
