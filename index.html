<script>
function verifySignature() {
    const badge = document.querySelector(".verified-badge");

    // FIXED: Line endings changed to \r\n to match the data.txt structure precisely
    const data = "Fares Nasr\r\nAlimento S.A.\r\nAlma Caribe S.A.\r\nfares.nasr@alimento.com.cy\r\nfares.nasr@almacaribe.online\r\nhttps://iberiaalimento.com\r\nhttps://tiendagoa.com\r\n+35799477880"; 

    const publicKey = document.getElementById("publicKey").content;

    // Clean up the Base64 signature string
    const base64Signature = document
        .getElementById("digitalSignature")
        .content
        .replace(/\s/g, "");

    try {
        const sig = new KJUR.crypto.Signature({
            alg: "SHA256withRSA" 
        });

        // Initialize the signature object with your public key
        sig.init(publicKey);

        // Feed the precise text to be verified
        sig.updateString(data);

        // Convert the Base64 signature to a Hexadecimal string before verifying
        const hexSignature = b64tohex(base64Signature);

        // Verify the Hexadecimal signature
        const isValid = sig.verify(hexSignature);

        if (isValid) {
            badge.textContent = "🔒 Digital Signature: Verified";
            badge.style.background = "#e6fffa";
            badge.style.color = "#00a389";
            badge.style.border = "1px solid #b2f5ea";
        } else {
            badge.textContent = "❌ Digital Signature: Invalid";
            badge.style.background = "#fff5f5";
            badge.style.color = "#e53e3e";
            badge.style.border = "1px solid #fed7d7";
        }
    } catch (e) {
        console.error(e);
        badge.textContent = "⚠️ Signature Verification Error";
    }
}
verifySignature();
</script>
